  <link rel="stylesheet" href="../styles.css">
  <script>
    (() => {
      // Clean URL redirect
      if (window.location.pathname.endsWith('/index.html')) {
        const cleanPath = window.location.pathname.replace('/index.html', '/');
        window.location.replace(window.location.origin + cleanPath + window.location.search);
      }

      const v = '20260502-1';
      const isHttp = window.location.protocol === 'http:' || window.location.protocol === 'https:';
      if (isHttp) {
        const url = new URL(window.location.href);
        if (!url.searchParams.get('v')) {
          url.searchParams.set('v', v);
          window.location.replace(url.toString());
          return;
        }

        const cssLink = document.querySelector('link[rel="stylesheet"][href="styles.css"]');
        if (cssLink) cssLink.href = `styles.css?v=${encodeURIComponent(v)}`;
      }
    })();
  </script>
</head>
